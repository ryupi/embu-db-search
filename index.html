<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>演武DB 検索</title>
<style>
  :root {
    color-scheme: light;
    --bg: #ffffff;
    --panel: #f7f7f8;
    --border: #e3e3e6;
    --text: #1f2023;
    --muted: #6b6f76;
    /* 慶應義塾 公式ブランドカラー（VIガイドライン準拠） */
    --accent: #C63527;      /* 慶應レッド */
    --accent-dark: #9c2a1e;
    --accent-soft: #fbe9e6;
    --header-bg: #001E62;   /* 慶應ブルー */
    --gold: #F1C400;        /* 慶應イエロー（アクセント用） */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Segoe UI", sans-serif;
    font-size: 14px;
  }
  .tricolor-bar {
    height: 5px;
    background: linear-gradient(to right, var(--header-bg) 0 42%, var(--accent) 42% 58%, var(--header-bg) 58% 100%);
  }
  .wrap { padding: 20px 24px 40px; max-width: 1400px; margin: 0 auto; }
  h1 {
    font-size: 20px;
    margin: 0 0 4px;
    font-weight: 700;
    color: var(--header-bg);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  .subtitle { color: var(--muted); margin: 0 0 18px; font-size: 13px; }

  .filters {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
    margin-bottom: 14px;
  }
  .field { display: flex; flex-direction: column; gap: 4px; min-width: 150px; }
  .field.grow { flex: 1 1 220px; }
  .field label { font-size: 11px; color: var(--muted); font-weight: 600; }
  .field input, .field select {
    padding: 7px 9px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .reset-btn {
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    height: 32px;
  }
  .reset-btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .search-btn {
    padding: 7px 18px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    height: 32px;
  }
  .search-btn:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 12.5px;
    color: var(--muted);
  }
  .status-row b { color: var(--text); }
  .refresh-btn {
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .refresh-btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  .table-scroll {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: auto;
    max-height: 68vh;
  }
  table { border-collapse: collapse; width: 100%; min-width: 980px; }
  thead th {
    position: sticky;
    top: 0;
    background: var(--header-bg);
    color: #fff;
    text-align: left;
    padding: 9px 10px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    z-index: 1;
  }
  thead th:hover { background: #3a3d42; }
  thead th .arrow { opacity: 0.6; font-size: 10px; margin-left: 3px; }
  tbody td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    font-size: 12.5px;
  }
  tbody tr:hover { background: var(--accent-soft); }
  tbody tr:nth-child(even) { background: #fafafa; }
  tbody tr:nth-child(even):hover { background: var(--accent-soft); }
  td.rank { text-align: center; }
  td.step { text-align: center; }
  a.yt-link {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  a.yt-link:hover { text-decoration: underline; }
  .empty-cell { color: #c7c8cc; }

  .state-msg {
    padding: 40px 0;
    text-align: center;
    color: var(--muted);
  }
  .state-msg.error { color: var(--accent); }
  footer {
    margin-top: 18px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
  .report-link {
    background: none;
    border: none;
    color: var(--muted);
    text-decoration: underline;
    cursor: pointer;
    font-size: 11px;
    padding: 0;
  }
  .report-link:hover { color: var(--accent); }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 10px;
    padding: 20px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .modal-box h2 {
    font-size: 15px;
    margin: 0 0 10px;
    color: var(--header-bg);
  }
  .modal-box p.hint {
    font-size: 12px;
    color: var(--muted);
    margin: 0 0 10px;
  }
  .modal-box textarea {
    width: 100%;
    min-height: 100px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    outline: none;
    box-sizing: border-box;
  }
  .modal-box textarea:focus { border-color: var(--accent); }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
  }
  .modal-cancel-btn {
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
  }
  .modal-submit-btn {
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .modal-submit-btn:disabled { opacity: 0.6; cursor: default; }
  .modal-msg { font-size: 12px; margin-top: 8px; }
  .modal-msg.ok { color: #2a7a2a; }
  .modal-msg.err { color: var(--accent); }

  /* スマホ向け：表をカード形式に切り替え */
  @media (max-width: 700px) {
    .wrap { padding: 14px 12px 28px; }
    h1 { font-size: 18px; }
    .filters { padding: 12px; gap: 10px; }
    .field { min-width: 0; flex: 1 1 100%; }
    .field.grow { flex: 1 1 100%; }
    .search-btn, .reset-btn { flex: 1 1 48%; text-align: center; }
    .status-row { flex-wrap: wrap; gap: 6px; }

    .table-scroll { border: none; max-height: none; overflow: visible; }
    table { min-width: 0; width: 100%; }
    thead {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
      border: 0; padding: 0; margin: -1px;
    }
    tbody { display: block; }
    tbody tr {
      display: block;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      padding: 4px 12px;
      background: #fff;
    }
    tbody tr:nth-child(even) { background: #fff; }
    tbody td {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 7px 0;
      border-bottom: 1px dashed var(--border);
      white-space: normal;
      text-align: right;
    }
    tbody td:last-child { border-bottom: none; }
    tbody td::before {
      content: attr(data-label);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-align: left;
      flex-shrink: 0;
    }
  }
</style>
</head>
<body>
<div class="tricolor-bar"></div>
<div class="wrap">
  <h1>演武DB 検索</h1>
  <p class="subtitle" id="subtitle"></p>

  <div class="filters">
    <div class="field grow">
      <label for="f-start">構成の始まりの技</label>
      <select id="f-start"><option value="">すべて</option></select>
    </div>
    <div class="field grow">

    </div>

      <label for="f-univ">大学</label>

    </div>

  <div class="table-scroll">
    <table id="data-table" style="display:none">
      <thead>
        <tr>
          <th data-key="大会名">大会名</th>
          <th data-key="順位">順位</th>
          <th data-key="部門名">部門名</th>
          <th data-key="大学名">大学名</th>
          <th data-key="組名">組名</th>
          <th data-key="構成番号">構成</th>
          <th data-key="構成の始まりの技">始まりの技</th>

</div>

<div class="modal-overlay" id="report-modal">
  <div class="modal-box">
    <h2>間違いなどの報告</h2>
    <p class="hint">データの誤りや不具合など、気づいたことを自由に書いてください。内容は管理者にのみ届きます。</p>
    <textarea id="report-text" placeholder="例：E123の構成4の技名が違う気がします"></textarea>
    <div class="modal-actions">
      <button class="modal-cancel-btn" id="report-cancel-btn" type="button">閉じる</button>
      <button class="modal-submit-btn" id="report-submit-btn" type="button">送信</button>
    </div>
    <div class="modal-msg" id="report-msg"></div>
  </div>
</div>

<script>
const SHEET_ID = "1nbb5p-XSvTIaYFIddlcIRjukZ4T0Jia8I7zeCQBb6qw";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
const COUNTER_NAMESPACE = "embu-db-search";
const COUNTER_NAME = "pageviews";
const COUNTER_URL = `https://api.counterapi.dev/v1/${COUNTER_NAMESPACE}/${COUNTER_NAME}/up`;
const VISIT_HISTORY_KEY = "embu_visit_history";
const VISIT_HISTORY_MAX = 60;
// URLに ?admin=ryuu を付けて開いた時だけ閲覧数・グラフを表示する（それ以外の人には見えない）
const OWNER_KEY = "admin";
const OWNER_VALUE = "ryuu";
// 「間違いなどを報告する」フォームの送信先（Formspree）。届いた内容は管理者のメール／ダッシュボードにのみ表示され、
// サイト上の他の利用者には一切見えない。
const REPORT_FORM_URL = "https://formspree.io/f/xzdlnlnk";

function pad2(n) { return String(n).padStart(2, "0"); }
function dateStr(d) { return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; }

async function bumpVisitCounter() {
  const isOwner = new URLSearchParams(location.search).get(OWNER_KEY) === OWNER_VALUE;
  const el = document.getElementById("visit-count");
  try {
    const res = await fetch(COUNTER_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (typeof data.count === "number") {
      if (el && isOwner) {
        el.textContent = `／累計閲覧数: ${data.count}回`;
      }
      // CounterAPIの無料枠は「増やす」エンドポイントしかブラウザから読めない（CORS制限で過去の値は読めない）ため、
      // 自分（管理者）が開いたタイミングの累計値だけを自分のブラウザに記録してグラフ化する。
      if (isOwner) recordVisitHistory(data.count);
    }
  } catch (e) {
    // カウンターの取得に失敗してもアプリ本体には影響させない
  }
  if (isOwner) renderVisitGraph();
}

function recordVisitHistory(count) {
  try {
    const today = dateStr(new Date());
    let history = [];
    try { history = JSON.parse(localStorage.getItem(VISIT_HISTORY_KEY)) || []; } catch (e) { history = []; }
    const idx = history.findIndex(h => h.date === today);
    if (idx >= 0) history[idx].count = count;
    else history.push({ date: today, count });
    history.sort((a, b) => a.date.localeCompare(b.date));
    if (history.length > VISIT_HISTORY_MAX) history = history.slice(history.length - VISIT_HISTORY_MAX);
    localStorage.setItem(VISIT_HISTORY_KEY, JSON.stringify(history));
  } catch (e) {
    // localStorageが使えない環境でもアプリ本体には影響させない
  }
}

function renderVisitGraph() {
  const container = document.getElementById("visit-graph");
  if (!container) return;
  let history = [];
  try { history = JSON.parse(localStorage.getItem(VISIT_HISTORY_KEY)) || []; } catch (e) { history = []; }
  if (history.length < 2) {
    container.innerHTML =
      `<div style="margin-top:6px;font-size:10px;color:var(--muted);">グラフは自分がこのページを開くたびに記録されます。もう数回開くと推移が表示されます。</div>`;
    return;
  }
  const counts = history.map(h => h.count);
  const min = Math.min(...counts);
  const max = Math.max(...counts);
  const range = Math.max(1, max - min);
  const w = 360, h = 64, padTop = 6, padBottom = 14;
  const stepX = history.length > 1 ? w / (history.length - 1) : w;
  const points = history.map((hItem, i) => {
    const x = i * stepX;
    const y = padTop + (1 - (hItem.count - min) / range) * (h - padTop - padBottom);
    return { x, y, ...hItem };
  });
  const linePath = points.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ");
  const dots = points.map(p =>
    `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.5" fill="#C63527"><title>${p.date}: ${p.count}回</title></circle>`
  ).join("");
  const firstLabel = history[0].date.slice(5);
  const lastLabel = history[history.length - 1].date.slice(5);
  container.innerHTML =
    `<div style="margin-top:6px;">` +
    `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" style="max-width:360px;">` +
    `<path d="${linePath}" fill="none" stroke="#001E62" stroke-width="1.5"/>${dots}</svg>` +
    `<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);max-width:360px;margin:0 auto;">` +
    `<span>${firstLabel}</span><span>自分が確認した累計閲覧数の推移</span><span>${lastLabel}</span>` +
    `</div></div>`;
}

// サブタイトルに表示するメッセージ一覧。開くたびにランダムで1つ表示される。
// 追加・削除は自由にこの配列を編集するだけでOK。
const SUBTITLE_MESSAGES = [
  "力愛不ニ",
  "単体柔法は”単体”と入れてね！",
  "動画研究は上達への一歩",
  "力愛不ニ，力愛不ニ，力愛不ニ",
  "ショート見るな、演武を見ろ",
  "好きな四字熟語は慶應義塾",
  "慶應万歳！！體育會万歳！！",
  "蹴りで終わるものは全部”蹴り”で検索！",
  "ダッシュ蹴りなんてないよ",
];

function showRandomSubtitle() {
  const el = document.getElementById("subtitle");
  if (!el || SUBTITLE_MESSAGES.length === 0) return;
  const msg = SUBTITLE_MESSAGES[Math.floor(Math.random() * SUBTITLE_MESSAGES.length)];
  el.textContent = msg;
}

let allRows = [];
let sortKey = null;
let sortDir = 1;
let hasSearched = false;

// Minimal RFC4180-ish CSV parser (handles quoted fields, embedded commas/newlines/escaped quotes).
function parseCsv(text) {
  const rows = [];
  let row = [];
  let field = "";
  let inQuotes = false;
  const s = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (inQuotes) {
      if (c === '"') {
        if (s[i + 1] === '"') { field += '"'; i++; }
        else { inQuotes = false; }
      } else {
        field += c;
      }
    } else {
      if (c === '"') {
        inQuotes = true;
      } else if (c === ",") {
        row.push(field); field = "";
      } else if (c === "\n") {
        row.push(field); field = "";
        rows.push(row); row = [];
      } else {
        field += c;
      }
    }
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  return rows.filter(r => !(r.length === 1 && r[0] === ""));
}

function parseSheetCsv(text) {
  const table = parseCsv(text);
  if (table.length === 0) return [];
  const headers = table[0];
  const rows = [];
  for (let i = 1; i < table.length; i++) {
    const cells = table[i];
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = cells[idx] !== undefined ? cells[idx] : ""; });
    rows.push(obj);
  }
  return rows;
}

// 部門は数の多い順ではなく、段位の高い順（既定の並び）で表示する。
// 一覧にない部門名が出てきた場合は、末尾に件数の多い順で追加される。
const BUMON_ORDER = [
  "男子三段以上の部",
  "女子三段以上の部",
  "男女二段以上の部",
  "男子二段の部",
  "女子二段の部",
  "男子初段の部",
  "女子初段の部",
  "男女初段の部",
  "男子初段",
  "男子茶帯の部",
  "女子茶帯の部",
  "男女茶帯の部",
  "男子茶帯",
  "女子茶帯",
  "男女茶帯",
  "男子白緑の部",
  "女子白緑の部",
  "男女白緑の部",
  "男子白緑",
  "女子白緑",
  "男女白緑",
  "男子白緑帯の部",
  "女子白緑帯",
  "男子白緑帯",
  "男子白帯緑帯",
  "男女白帯緑帯",
  "男子有段の部",
  "大学生男子",
  "大学生女子",
];

// 構成の始まり／終わりの技が空欄の行を選べるようにするための特別な値
const BLANK_SENTINEL = "__blank__";

function populateSelect(selectEl, values, orderList, includeBlankAsOther) {
  const prev = selectEl.value;
  selectEl.innerHTML = '<option value="">すべて</option>';
  const counts = new Map();
  let blankCount = 0;
  values.forEach(v => {
    if (!v || v.trim() === "") { blankCount++; return; }
    counts.set(v, (counts.get(v) || 0) + 1);
  });
  if (includeBlankAsOther && blankCount > 0) {
    counts.set(BLANK_SENTINEL, blankCount);
  }
  let sorted;
  if (orderList) {
    sorted = Array.from(counts.entries()).sort((a, b) => {
      if (a[0] === BLANK_SENTINEL) return 1;
      if (b[0] === BLANK_SENTINEL) return -1;
      const ai = orderList.indexOf(a[0]);
      const bi = orderList.indexOf(b[0]);
      const aRank = ai === -1 ? orderList.length : ai;
      const bRank = bi === -1 ? orderList.length : bi;
      if (aRank !== bRank) return aRank - bRank;
      if (b[1] !== a[1]) return b[1] - a[1];
      return a[0].localeCompare(b[0], "ja");
    });
  } else {
    sorted = Array.from(counts.entries()).sort((a, b) => {
      if (a[0] === BLANK_SENTINEL) return 1;
      if (b[0] === BLANK_SENTINEL) return -1;
      if (b[1] !== a[1]) return b[1] - a[1];
      return a[0].localeCompare(b[0], "ja");
    });
  }
  sorted.forEach(([v, count]) => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v === BLANK_SENTINEL ? `その他 (${count})` : `${v} (${count})`;
    selectEl.appendChild(opt);
  });
  if (Array.from(selectEl.options).some(o => o.value === prev)) selectEl.value = prev;
}

function getFilters() {
  return {
    startTech: document.getElementById("f-start").value,
    endTech: document.getElementById("f-end").value,
    bumon: document.getElementById("f-bumon").value,
    univ: document.getElementById("f-univ").value,
  };
}

function fieldMatches(val, filterVal) {
  if (!filterVal) return true;
  if (filterVal === BLANK_SENTINEL) return !val || val.trim() === "";
  return val === filterVal;
}

function rowMatches(row, f, excludeKey) {
  if (excludeKey !== "bumon" && f.bumon && row["部門名"] !== f.bumon) return false;
  if (excludeKey !== "univ" && f.univ && row["大学名"] !== f.univ) return false;
  if (excludeKey !== "startTech" && !fieldMatches(row["構成の始まりの技"], f.startTech)) return false;
  if (excludeKey !== "endTech" && !fieldMatches(row["構成の終わりの技"], f.endTech)) return false;
  return true;
}

// 各フィルターの選択肢を、他のフィルターで選ばれている条件と実際に組み合わさっているものだけに絞る（相互絞り込み）
function updateLinkedOptions() {
  const f = getFilters();

  const rowsForStart = allRows.filter(r => rowMatches(r, f, "startTech"));
  populateSelect(document.getElementById("f-start"), rowsForStart.map(r => r["構成の始まりの技"]), null, true);

  const rowsForEnd = allRows.filter(r => rowMatches(r, f, "endTech"));
  populateSelect(document.getElementById("f-end"), rowsForEnd.map(r => r["構成の終わりの技"]), null, true);

  const rowsForBumon = allRows.filter(r => rowMatches(r, f, "bumon"));
  populateSelect(document.getElementById("f-bumon"), rowsForBumon.map(r => r["部門名"]), BUMON_ORDER);

  const rowsForUniv = allRows.filter(r => rowMatches(r, f, "univ"));
  populateSelect(document.getElementById("f-univ"), rowsForUniv.map(r => r["大学名"]));
}

function render() {
  const tbody0 = document.getElementById("table-body");
  const stateMsg0 = document.getElementById("state-msg");

  if (!hasSearched) {
    document.getElementById("data-table").style.display = "none";
    tbody0.innerHTML = "";
    stateMsg0.style.display = "";
    stateMsg0.className = "state-msg";
    stateMsg0.textContent = "条件を選んで「検索」を押してください。";
    document.getElementById("status-text").innerHTML =
      `条件を指定して検索してください（全 ${allRows.length} 件）`;
    return;
  }

  const f = getFilters();
  let rows = allRows.filter(r => rowMatches(r, f));

  if (sortKey) {
    rows = rows.slice().sort((a, b) => {
      let av = sortKey === "__yt" ? (a["YouTubeリンク"] || "") : (a[sortKey] || "");
      let bv = sortKey === "__yt" ? (b["YouTubeリンク"] || "") : (b[sortKey] || "");
      if (sortKey === "構成番号") {
        av = parseInt(av) || 0; bv = parseInt(bv) || 0;
        return (av - bv) * sortDir;
      }
      return av.toString().localeCompare(bv.toString(), "ja") * sortDir;
    });
  }

  const performanceCount = new Set(rows.map(r => r["演武ID"])).size;
  document.getElementById("status-text").innerHTML =
    `<b>${rows.length}</b> 件表示中（<b>${performanceCount}</b> 演武 / 全 ${allRows.length} 件中）`;

  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";
  const frag = document.createDocumentFragment();

  rows.forEach(row => {
    const tr = document.createElement("tr");

    const cells = [
      row["大会名"], row["順位"], row["部門名"],
      row["大学名"], row["組名"], row["構成番号"],
      row["構成の始まりの技"], row["構成の終わりの技"]
    ];
    const cellLabels = ["大会名", "順位", "部門名", "大学名", "組名", "構成", "始まりの技", "終わりの技"];
    cells.forEach((val, idx) => {
      const td = document.createElement("td");
      td.setAttribute("data-label", cellLabels[idx]);
      if (idx === 1) td.className = "rank";
      if (idx === 5) td.className = "step";
      if (val && val.trim() !== "") {
        td.textContent = val;
      } else {
        td.textContent = "—";
        td.className += " empty-cell";
      }
      tr.appendChild(td);
    });

    const ytTd = document.createElement("td");
    ytTd.setAttribute("data-label", "動画");
    const url = row["YouTubeリンク"];
    if (url) {
      const a = document.createElement("a");
      a.href = url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.className = "yt-link";
      a.textContent = "▶ 視聴";
      ytTd.appendChild(a);
    } else {
      ytTd.textContent = "—";
      ytTd.className = "empty-cell";
    }
    tr.appendChild(ytTd);

    frag.appendChild(tr);
  });
  tbody.appendChild(frag);

  document.getElementById("data-table").style.display = rows.length ? "" : "none";
  const stateMsg = document.getElementById("state-msg");
  if (rows.length === 0) {
    stateMsg.style.display = "";
    stateMsg.textContent = "条件に一致するデータがありません。";
    stateMsg.className = "state-msg";
  } else {
    stateMsg.style.display = "none";
  }
}

function setupSorting() {
  document.querySelectorAll("thead th").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.getAttribute("data-key");
      if (sortKey === key) {
        sortDir *= -1;
      } else {
        sortKey = key;
        sortDir = 1;
      }
      document.querySelectorAll("thead th .arrow").forEach(a => a.remove());
      const arrow = document.createElement("span");
      arrow.className = "arrow";
      arrow.textContent = sortDir === 1 ? "▲" : "▼";
      th.appendChild(arrow);
      render();
    });
  });
}

let filterEventsBound = false;
function setupFilterEvents() {
  if (filterEventsBound) return;
  filterEventsBound = true;
  document.getElementById("search-btn").addEventListener("click", () => {
    hasSearched = true;
    render();
  });
  ["f-start", "f-end", "f-bumon", "f-univ"].forEach(id => {
    document.getElementById(id).addEventListener("change", () => {
      updateLinkedOptions();
    });
  });
  ["f-start", "f-end", "f-bumon", "f-univ"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        hasSearched = true;
        render();
      }
    });
  });
  document.getElementById("reset-btn").addEventListener("click", () => {
    document.getElementById("f-start").value = "";
    document.getElementById("f-end").value = "";
    document.getElementById("f-bumon").value = "";
    document.getElementById("f-univ").value = "";
    updateLinkedOptions();
    hasSearched = false;
    render();
  });
  document.getElementById("refresh-btn").addEventListener("click", load);
}

async function load() {
  const stateMsg = document.getElementById("state-msg");
  const statusText = document.getElementById("status-text");
  statusText.textContent = "読み込み中...";
  try {
    const res = await fetch(CSV_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const csvText = await res.text();
    const table = parseCsv(csvText);
    const parsedRows = parseSheetCsv(csvText);
    // スプレッドシート1列目の見出し名が「演武ID」以外（空欄含む）でも、
    // 常に生データの先頭列（位置）を演武IDとして扱うことで見出しセルの変更に強くする
    // （1列目・末尾列の見出しがどちらも空文字だと同じキーに衝突するため、位置ベースで取得する）
    for (let i = 1; i < table.length; i++) {
      const row = parsedRows[i - 1];
      if (row) row["演武ID"] = table[i][0] !== undefined ? table[i][0] : "";
    }
    allRows = parsedRows.filter(r => r["演武ID"] && r["演武ID"].trim() !== "");

    updateLinkedOptions();

    setupSorting();
    setupFilterEvents();
    document.getElementById("updated-text").textContent =
      "最終読み込み: " + new Date().toLocaleString("ja-JP");

    render();
  } catch (err) {
    stateMsg.className = "state-msg error";
    stateMsg.style.display = "";
    stateMsg.textContent = "データの読み込みに失敗しました: " + (err && err.message ? err.message : err);
    statusText.textContent = "読み込みエラー";
  }
}

function setupReportModal() {
  const overlay = document.getElementById("report-modal");
  const openBtn = document.getElementById("report-open-btn");
  const cancelBtn = document.getElementById("report-cancel-btn");
  const submitBtn = document.getElementById("report-submit-btn");
  const textarea = document.getElementById("report-text");
  const msg = document.getElementById("report-msg");

  function openModal() {
    overlay.classList.add("open");
    msg.textContent = "";
    msg.className = "modal-msg";
    textarea.disabled = false;
    submitBtn.disabled = false;
    submitBtn.textContent = "送信";
    textarea.focus();
  }
  function closeModal() {
    overlay.classList.remove("open");
  }

  openBtn.addEventListener("click", openModal);
  cancelBtn.addEventListener("click", closeModal);
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closeModal();
  });

  submitBtn.addEventListener("click", async () => {
    const text = textarea.value.trim();
    if (!text) {
      msg.textContent = "内容を入力してください。";
      msg.className = "modal-msg err";
      return;
    }
    submitBtn.disabled = true;
    textarea.disabled = true;
    submitBtn.textContent = "送信中...";
    msg.textContent = "";
    msg.className = "modal-msg";
    try {
      const res = await fetch(REPORT_FORM_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({
          message: text,
          page: location.href,
          sentAt: new Date().toLocaleString("ja-JP"),
        }),
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      msg.textContent = "報告ありがとうございます！送信されました。";
      msg.className = "modal-msg ok";
      textarea.value = "";
      submitBtn.textContent = "送信済み";
      setTimeout(closeModal, 1500);
    } catch (e) {
      msg.textContent = "送信に失敗しました。時間をおいて再度お試しください。";
      msg.className = "modal-msg err";
      submitBtn.disabled = false;
      textarea.disabled = false;
      submitBtn.textContent = "送信";
    }
  });
}

showRandomSubtitle();
load();
bumpVisitCounter();
setupReportModal();
</script>
